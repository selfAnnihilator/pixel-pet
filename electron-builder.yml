appId: com.abhi.pixelpet
productName: Pixel Pet
copyright: Pixel art by Artoellie (itch.io)

directories:
  output: dist
  buildResources: build

# Ship the generated sheets + manifest; never the raw source art or aseprite.
files:
  - src/**/*
  - assets/manifest.json
  - assets/cat/**
  - assets/puppy/**
  - "!assets/src/**"
  - "!tools/**"

asarUnpack:
  # uiohook-napi ships a prebuilt .node that must stay on disk, not inside the asar.
  - "**/node_modules/uiohook-napi/**"

linux:
  category: Utility
  icon: build/icon.png
  target:
    - AppImage
    - deb

deb:
  depends:
    - libx11-6
    - libxtst6
    - libxkbcommon0

win:
  icon: build/icon.png
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
