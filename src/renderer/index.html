<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' file:; style-src 'unsafe-inline'" />
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: transparent;
      cursor: grab;
      user-select: none;
    }
    #stage { display: block; image-rendering: pixelated; }
    #bubble {
      position: absolute; display: none;
      transform: translateX(-50%);
      padding: 3px 9px; border-radius: 10px;
      background: rgba(30, 30, 38, 0.9); color: #fff;
      font: 12px system-ui, sans-serif; white-space: nowrap;
      pointer-events: none; box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="bubble"></div>
  <script type="module" src="./engine.js"></script>
</body>
</html>
